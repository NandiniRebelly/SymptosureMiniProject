<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symptoms Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            padding: 40px;
            max-width: 760px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333; font-size: 2.2em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.05em; }
        .status-indicator {
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 14px;
        }
        .status-online { background: #d4edda; color: #155724; }
        .status-offline { background: #f8d7da; color: #721c24; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { resize: vertical; min-height: 110px; }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 140px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd8; transform: translateY(-1px); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #218838; }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .mode-toggle {
            display: flex;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .mode-toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            min-width: auto;
        }
        .mode-toggle button.active {
            background: #667eea;
            color: white;
        }

        .results {
            margin-top: 28px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .results.show { display: block; }

        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .result-item h3 { color: #333; margin-bottom: 10px; }
        .probability { font-size: 1.1em; font-weight: bold; color: #667eea; }

        .severity {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.88em;
            font-weight: bold;
            margin-left: 10px;
        }
        .severity-low { background: #d4edda; color: #155724; }
        .severity-medium { background: #fff3cd; color: #856404; }
        .severity-high { background: #f8d7da; color: #721c24; }

        .precautions { margin-top: 10px; }
        .precautions ul { margin-left: 20px; }
        .precautions li { margin-bottom: 5px; }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-weight: 600;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
        }

        .voice-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
        .voice-listening { background: #d4edda; color: #155724; }
        .voice-error { background: #f8d7da; color: #721c24; }
        .voice-idle { background: #e2e3e5; color: #383d41; }

        @media (max-width: 768px) {
            .container { padding: 22px; }
            .button-group { flex-direction: column; }
        }
    </style>

        <div class="form-group">
            <label id="inputModeLabel">Input Mode</label>
            <div class="mode-toggle">
                <button type="button" id="textMode" class="active">📝 Text</button>
                <button type="button" id="voiceMode">🎤 Voice</button>
            </div>
        </div>

        <div id="voiceStatus" class="voice-status"></div>

        <div class="form-group">
            <label for="symptomsInput" id="symptomsLabel">Describe your symptoms</label>
            <textarea id="symptomsInput" name="symptoms" placeholder="Enter your symptoms here..."></textarea>
        </div>

        <div class="button-group">
            <button type="button" id="recordBtn" class="btn-secondary" style="display:none;">🎤 Start Recording</button>
            <button type="button" id="stopBtn" class="btn-danger" style="display:none;">⏹️ Stop Recording</button>
            <button type="submit" id="submitBtn" class="btn-primary">🔍 Analyze Symptoms</button>
        </div>

        <div class="button-group" id="ttsControls" style="display:none;">
            <button type="button" id="speakBtn" class="btn-success">🔊 Speak Results</button>
            <button type="button" id="stopSpeakBtn" class="btn-secondary">⏹️ Stop Speaking</button>
        </div>
    </form>

    <div id="results" class="results">
        <div id="loadingIndicator" class="loading" style="display:none;">🔄 Analyzing symptoms...</div>
        <div id="resultsContent"></div>
    </div>
</div>

function getText() {
    const lang = document.getElementById('language').value || 'en';
    return UI_TEXT[lang] || UI_TEXT.en;
}

function applyLanguageUI(lang) {
    const t = UI_TEXT[lang] || UI_TEXT.en;

    document.querySelector('.header h1').textContent = t.title;
    document.querySelector('.header p').textContent = t.subtitle;
    document.querySelector('label[for="language"]').textContent = t.languageLabel;
    document.getElementById('inputModeLabel').textContent = t.inputMode;
    document.getElementById('textMode').textContent = t.textMode;
    document.getElementById('voiceMode').textContent = t.voiceMode;
    document.getElementById('symptomsLabel').textContent = t.describeSymptoms;
    document.getElementById('symptomsInput').placeholder = t.placeholder;
    document.getElementById('submitBtn').textContent = t.analyzeBtn;
    document.getElementById('speakBtn').textContent = t.speakBtn;
    document.getElementById('stopSpeakBtn').textContent = t.stopSpeakBtn;
    document.getElementById('recordBtn').textContent = t.startRecording;
    document.getElementById('stopBtn').textContent = t.stopRecording;
    document.getElementById('loadingIndicator').textContent = t.analyzing;

    if (apiPort) {
        updateApiStatus(`${t.online} ${apiPort}`, true);
    } else {
        updateApiStatus(t.offline, false);
    }
}

document.addEventListener('DOMContentLoaded', function () {
    initializeApp();
});

function initializeApp() {
    detectApiPort();

    document.getElementById('symptomsForm').addEventListener('submit', handleFormSubmit);
    document.getElementById('textMode').addEventListener('click', () => switchMode('text'));
    document.getElementById('voiceMode').addEventListener('click', () => switchMode('voice'));
    document.getElementById('recordBtn').addEventListener('click', startVoiceRecording);
    document.getElementById('stopBtn').addEventListener('click', stopVoiceRecording);
    document.getElementById('speakBtn').addEventListener('click', speakResults);
    document.getElementById('stopSpeakBtn').addEventListener('click', stopSpeaking);

    document.getElementById('language').addEventListener('change', function () {
        applyLanguageUI(this.value);
        updateRecognitionLanguage(this.value);
        detectApiPort();
    });

    initializeSpeechRecognition();
    applyLanguageUI(document.getElementById('language').value);

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
}

async function detectApiPort() {
    const ports = [8000, 8001, 8002, 8003, 8004, 8005, 8006, 8007, 8008, 8009, 8010];
    for (const port of ports) {
        try {
            const response = await fetch(`http://localhost:${port}/health`, { method: 'GET' });
            if (response.ok) {
                apiPort = port;
                const t = getText();
                updateApiStatus(`${t.online} ${port}`, true);
                return;
            }
        } catch (e) {}
    }
    apiPort = null;
    const t = getText();
    updateApiStatus(t.offline, false);
}

function updateApiStatus(message, isOnline) {
    const indicator = document.getElementById('statusIndicator');
    indicator.textContent = message;
    indicator.className = `status-indicator ${isOnline ? 'status-online' : 'status-offline'}`;
}

function updateOnlineStatus() {
    const t = getText();
    if (navigator.onLine && apiPort) {
        updateApiStatus(`${t.online} ${apiPort}`, true);
    } else {
        updateApiStatus(t.offline, false);
    }
}

function switchMode(mode) {
    currentMode = mode;
    document.getElementById('textMode').classList.toggle('active', mode === 'text');
    document.getElementById('voiceMode').classList.toggle('active', mode === 'voice');

    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const voiceStatus = document.getElementById('voiceStatus');

    if (mode === 'voice') {
        recordBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        voiceStatus.style.display = 'block';

        if (!recognition) {
            updateVoiceStatus('error', 'Voice recognition not available in this browser');
        } else {
            updateVoiceStatus('idle', '');
        }
    } else {
        recordBtn.style.display = 'none';
        stopBtn.style.display = 'none';
        voiceStatus.style.display = 'none';
    }
}

function initializeSpeechRecognition() {
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        updateRecognitionLanguage(document.getElementById('language').value);

        recognition.onstart = function () {
            updateVoiceStatus('listening', '🎤 Listening...');
            isRecording = true;
            document.getElementById('recordBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
        };

        recognition.onresult = function (event) {
            const transcript = event.results[0][0].transcript;
            document.getElementById('symptomsInput').value = transcript;
        };

        recognition.onerror = function (event) {
            updateVoiceStatus('error', `Voice recognition error: ${event.error}`);
            isRecording = false;
            document.getElementById('recordBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        };

        recognition.onend = function () {
            isRecording = false;
            document.getElementById('recordBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
        };
    }
}

// function updateRecognitionLanguage(lang) {
//     if (!recognition) return;
//     const languageMap = { en: 'en-US', hi: 'hi-IN', te: 'te-IN' };
//     recognition.lang = languageMap[lang] || 'en-US';
// }

function updateRecognitionLanguage(lang) {
    if (!recognition) return;
    const languageMap = {
        en: 'en-US',
        hi: 'hi-IN',
        te: 'te-IN',
        kn: 'kn-IN',
        ta: 'ta-IN',
        pa: 'pa-IN'
    };
    recognition.lang = languageMap[lang] || 'en-US';
}

function updateVoiceStatus(status, message) {
    const voiceStatus = document.getElementById('voiceStatus');
    if (!message) {
        voiceStatus.style.display = 'none';
        return;
    }
    voiceStatus.style.display = 'block';
    voiceStatus.textContent = message;
    voiceStatus.className = `voice-status voice-${status}`;
}

function startVoiceRecording() {
    if (!recognition) {
        updateVoiceStatus('error', 'Voice recognition not available');
        return;
    }
    try {
        recognition.start();
    } catch (e) {
        updateVoiceStatus('error', 'Failed to start voice recognition');
    }
}

function stopVoiceRecording() {
    if (recognition && isRecording) recognition.stop();
}

async function handleFormSubmit(event) {
    event.preventDefault();

    const symptomsText = document.getElementById('symptomsInput').value.trim();
    const language = document.getElementById('language').value;

    if (!symptomsText) {
        alert('Please enter your symptoms');
        return;
    }

    showLoading(true);
    hideResults();
    stopSpeaking();

    try {
        let response;

        if (navigator.onLine && apiPort) {
            response = await callCloudAPI(symptomsText, language, currentMode === 'voice' ? 'voice' : 'text');
        } else {
            response = await callOfflinePrediction(symptomsText, language);
        }

        displayResults(response);
    } catch (error) {
        console.error('Error analyzing symptoms:', error);
        showError('Failed to analyze symptoms. Please try again.');
    } finally {
        showLoading(false);
    }
}

async function callCloudAPI(symptomsText, language, mode = 'text') {
    if (!apiPort) throw new Error('API not available - no port detected');

    const requestBody = {
        input: symptomsText,
        input_type: 'text',
        language: language,
        mode: mode
    };

    const response = await fetch(`http://localhost:${apiPort}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
    }

    return await response.json();
}

async function callOfflinePrediction(symptomsText, language) {
    await new Promise(resolve => setTimeout(resolve, 1000));
    return {
        input_text: symptomsText,
        input_text_user_lang: symptomsText,
        symptoms: ['fever', 'headache'],
        predictions: [
            {
                disease: 'Common Cold',
                prob: 0.75,
                severity: 'Medium',
                precautions: ['Rest well', 'Stay hydrated', 'Take over-the-counter medication'],
                symptom_descriptions: {}
            }
        ],
        predictions_translated: null,
        language: language,
        display_text: 'Offline prediction mode.'
    };
}

function displayResults(response) {
    currentResults = response;
    const t = getText();

    const resultsDiv = document.getElementById('results');
    const contentDiv = document.getElementById('resultsContent');
    const ttsControls = document.getElementById('ttsControls');

    let html = '';

    if (response.symptoms && response.symptoms.length > 0) {
        html += `<div class="result-item">
            <h3>${t.symptomsDetected}</h3>
            <p>${response.symptoms.join(', ')}</p>
        </div>`;
    }

    const displayPredictions =
        (response.language !== 'en' && response.predictions_translated && response.predictions_translated.length > 0)
            ? response.predictions_translated
            : response.predictions;

    if (displayPredictions && displayPredictions.length > 0) {
        html += `<div class="result-item"><h3>${t.diseasePredictions}</h3></div>`;

        displayPredictions.forEach((prediction, index) => {
            const severityClass = String(prediction.severity || '').toLowerCase().includes('low')
                || String(prediction.severity || '').includes('कम')
                || String(prediction.severity || '').includes('తక్కువ')
                ? 'severity-low'
                : (String(prediction.severity || '').toLowerCase().includes('medium')
                    || String(prediction.severity || '').includes('मध्यम')
                    || String(prediction.severity || '').includes('మధ్యస్థ')
                    ? 'severity-medium'
                    : 'severity-high');

            html += `
                <div class="result-item">
                    <h3>${index + 1}. ${prediction.disease}</h3>
                    <div>
                        <span class="probability">${(prediction.prob * 100).toFixed(1)}%</span>
                        <span class="severity ${severityClass}">${prediction.severity}</span>
                    </div>
                    ${prediction.precautions && prediction.precautions.length > 0 ? `
                        <div class="precautions">
                            <strong>${t.precautions}</strong>
                            <ul>
                                ${prediction.precautions.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `;
        });
    }

    if (response.display_text) {
        html += `<div class="result-item">
            <h3>${t.summary}</h3>
            <p>${response.display_text}</p>
        </div>`;
    }

    contentDiv.innerHTML = html;
    resultsDiv.classList.add('show');

    if (response.display_text) {
        ttsControls.style.display = 'flex';
    } else {
        ttsControls.style.display = 'none';
    }
}

function showLoading(show) {
    document.getElementById('results').classList.add('show');
    document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
    if (show) document.getElementById('resultsContent').innerHTML = '';
}

function hideResults() {
    document.getElementById('results').classList.remove('show');
    document.getElementById('resultsContent').innerHTML = '';
}

function showError(message) {
    const resultsDiv = document.getElementById('results');
    const contentDiv = document.getElementById('resultsContent');
    contentDiv.innerHTML = `<div class="error">Error: ${message}</div>`;
    resultsDiv.classList.add('show');
}

function base64ToBlob(base64, mimeType = 'audio/mpeg') {
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
        byteNumbers[i] = byteChars.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);
    return new Blob([byteArray], { type: mimeType });
}

function playAudioFromBase64(base64Audio) {
    stopSpeaking();
    const audioBlob = base64ToBlob(base64Audio, 'audio/mpeg');
    const audioUrl = URL.createObjectURL(audioBlob);
    currentAudio = new Audio(audioUrl);
    currentAudio.play().catch(err => {
        console.error('Audio playback failed:', err);
    });
    currentAudio.onended = () => {
        URL.revokeObjectURL(audioUrl);
    };
}

async function speakResults() {
    if (!currentResults) return;

    const lang = currentResults.language || 'en';
    const t = getText();
    const btn = document.getElementById('speakBtn');
    const originalText = btn.textContent;

    try {
        stopSpeaking();

        if (currentResults.tts_audio_base64) {
            playAudioFromBase64(currentResults.tts_audio_base64);
            return;
        }

        btn.disabled = true;
        btn.textContent = t.generatingAudio;

        const symptomsText = document.getElementById('symptomsInput').value.trim();
        if (!symptomsText) return;

        speakAbortController = new AbortController();

        const response = await fetch(`http://localhost:${apiPort}/predict`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                input: symptomsText,
                input_type: 'text',
                language: lang,
                mode: 'voice'
            }),
            signal: speakAbortController.signal
        });

        if (!response.ok) {
            throw new Error('Failed to generate speech audio');
        }

        const data = await response.json();

        if (data.tts_audio_base64) {
            currentResults.tts_audio_base64 = data.tts_audio_base64;
            playAudioFromBase64(data.tts_audio_base64);
        } else {
            throw new Error('No TTS audio returned by backend');
        }
    } catch (error) {
        if (error.name !== 'AbortError') {
            console.error('Speak Results error:', error);
        }
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
}

function stopSpeaking() {
    if (speakAbortController) {
        try { speakAbortController.abort(); } catch (e) {}
        speakAbortController = null;
    }

    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
    }
}
