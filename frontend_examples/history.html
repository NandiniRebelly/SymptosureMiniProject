<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #1976d2;
        }

        .history-card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            border-radius: 10px;
            width: 60%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-back {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-back:hover {
            background: #125ea5;
        }
    </style>
</head>

<body>

<h2>📜 Your Medical History</h2>

<div id="historyContainer"></div>

<button class="btn-back" onclick="goBack()">⬅ Back</button>

<script>

    window.onload = function () {
    const email = localStorage.getItem("email");

    if (!email) {
        alert("Please login first 🔐");
        window.location.href = "login.html";
        return;
    }

    loadHistory(); // ✅ only after login
};
async function loadHistory() {
    const email = localStorage.getItem("email") || "guest";

    try {
        const res = await fetch(`http://localhost:8000/history/${email}`);
        const data = await res.json();

        const container = document.getElementById("historyContainer");

        if (!data || data.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; color:gray;">
                    <h3>No history found 😕</h3>
                    <p>Start analyzing symptoms to see history here</p>
                </div>
            `;
            return;
        }

        let html = "";

        data.reverse().forEach((item, index) => {
            html += `
                <div class="history-card">
                    <h3>${index + 1}. ${item.prediction}</h3>
                    <p><strong>Symptoms:</strong> ${item.symptoms.join(", ")}</p>
                    <p><strong>Severity:</strong> ${item.severity}</p>
                    <p><strong>Date:</strong> ${new Date(item.date).toLocaleString()}</p>
                </div>
            `;
        });

        container.innerHTML = html;

    } catch (err) {
        console.error(err);
        alert("Error loading history");
    }
}

function goBack() {
    window.location.href = "index.html";
}

loadHistory();
</script>

</body>
</html>
